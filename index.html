<style>
  html,body,#root{height:100%;margin:0;background:#0b1026;}
  *{ -webkit-tap-highlight-color: transparent; }
  body{ font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif; overflow-x:hidden; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes drift { from { transform: translateX(-160px); } to { transform: translateX(1160px); } }
  @keyframes floatUp { 0%{ transform: translateY(0) scale(.7); opacity:0; } 15%{ opacity:1; transform:translateY(-6px) scale(1.1);} 100%{ transform: translateY(-78px) scale(1); opacity:0; } }
  @keyframes flick { 0%,100%{opacity:1;} 20%{opacity:.12;} 40%{opacity:.9;} 55%{opacity:.08;} 75%{opacity:.7;} 90%{opacity:.2;} }
  @keyframes pop { 0%{transform:scale(.6);opacity:0;} 60%{transform:scale(1.12);} 100%{transform:scale(1);opacity:1;} }
  @keyframes sunGlow { 0%,100%{ filter: drop-shadow(0 0 5px rgba(255,210,60,.6)); } 50%{ filter: drop-shadow(0 0 18px rgba(255,210,60,.95)); } }
  @keyframes flap { 0%,100%{ transform: scaleY(1); } 50%{ transform: scaleY(0.35); } }
  @keyframes alertPulse { 0%,100%{ transform:translateX(-50%) scale(1);} 50%{ transform:translateX(-50%) scale(1.05);} }

  .floater{ position:absolute; font-weight:900; pointer-events:none; animation: floatUp 1.4s ease-out forwards; text-shadow:0 2px 0 rgba(0,0,0,.4); }
  .blades{ transform-box: fill-box; transform-origin: center; }
  .flick{ animation: flick .25s steps(2,end) infinite; }
  .popIn{ animation: pop .4s cubic-bezier(.2,1.3,.4,1) both; }
  .alertP{ animation: alertPulse 1s ease-in-out infinite; }
  .bird-wing{ transform-box: fill-box; transform-origin: center; animation: flap .35s ease-in-out infinite; }
  .pixelshadow{ text-shadow: 2px 2px 0 rgba(0,0,0,.35); }
  .nodrag{ user-select:none; }
  .seg{ transition: all .12s ease; }
</style>

const pad2=(n)=>String(Math.floor(n)).padStart(2,'0');

function interp(pts,x){
  if(x<=pts[0][0])return pts[0][1];
  const n=pts.length; if(x>=pts[n-1][0])return pts[n-1][1];
  for(let i=0;i<n-1;i++){const [x0,y0]=pts[i],[x1,y1]=pts[i+1];
    if(x>=x0&&x<=x1){const t=(x-x0)/(x1-x0);return y0+(y1-y0)*t;}}
  return pts[n-1][1];
}
function hexToRgb(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function lerpColor(a,b,t){const A=hexToRgb(a),B=hexToRgb(b);return `rgb(${Math.round(A[0]+(B[0]-A[0])*t)},${Math.round(A[1]+(B[1]-A[1])*t)},${Math.round(A[2]+(B[2]-A[2])*t)})`;}

/* sky gradient over the day */
const SKY=[[0,'#0b1026','#1a2a4a'],[5,'#243b6b','#7d5a78'],[6.5,'#5e86c9','#f0b27a'],[8,'#6db3f2','#cfe8ff'],
[11,'#4a90d9','#bfe3ff'],[14,'#3d83d4','#bfe3ff'],[16.5,'#4f93d9','#ffe1b0'],[18.5,'#e07b3e','#ffcf8a'],
[20,'#9c4a6b','#e0a07a'],[21.5,'#2a2350','#553a66'],[23,'#101936','#22335c'],[24,'#0b1026','#1a2a4a']];
function skyColors(hour){let i=0;for(;i<SKY.length-1;i++){if(hour>=SKY[i][0]&&hour<=SKY[i+1][0])break;}
  i=clamp(i,0,SKY.length-2);const t=(hour-SKY[i][0])/(SKY[i+1][0]-SKY[i][0]);
  return [lerpColor(SKY[i][1],SKY[i+1][1],t),lerpColor(SKY[i][2],SKY[i+1][2],t)];}

/* demand shapes (fraction 0..1 of base..peak) */
const SHAPES={
  evening:[[0,0.05],[6,0.10],[8,0.45],[12,0.35],[17,0.62],[19,1.0],[21,0.95],[22,0.42],[24,0.08]],
  midday:[[0,0.05],[7,0.16],[11,0.7],[13,1.0],[16,0.9],[18,0.5],[20,0.4],[22,0.2],[24,0.05]],
  winter:[[0,0.32],[6,0.55],[8,1.0],[11,0.7],[16,0.82],[19,1.0],[22,0.6],[24,0.35]],
};
function demandOut(hour,base,peak,shape){return base+(peak-base)*interp(SHAPES[shape],hour);}
function solarOut(hour,mult,cap,sr,ss){if(hour<sr||hour>ss)return 0;return cap*Math.sin(Math.PI*(hour-sr)/(ss-sr))*mult;}
function priceAt(hour,night,dip,eve){
  const pts=[[0,night],[4,night*0.8],[7,night*1.2],[10,(dip+night)/2],[12,dip],[14,dip],
    [16,(dip+eve)/2],[18,eve*0.82],[19,eve],[20,eve*0.96],[21,eve*0.72],[22,night*1.4],[24,night]];
  return interp(pts,hour);
}

function estimateTarget(c){
  let rev=0;
  const avgCloud=1-c.cloudFreq*c.cloudDark*0.35;
  const avgWind=0.46*c.windMax*(c.birdFreq>0?0.9:1);
  for(let h=0;h<24;h+=0.2){
    const gen=solarOut(h,avgCloud,c.solarCap,c.sunrise,c.sunset)+avgWind;
    const d=demandOut(h,c.demBase,c.demPeak,c.shape);
    const surplus=Math.max(0,gen-d);
    rev+=surplus/1000*priceAt(h,c.night,c.dip,c.eve)*0.2;
  }
  return Math.max(150, Math.round(rev*c.factor/10)*10);
}

        const c=cityRef.current; const ng={...prev};
        const dt=24*(0.1/c.dayLen);

        ng.windTimer-=0.1;
        if(ng.windTimer<=0){ ng.windTimer=5+rand()*10;
          ng.windTarget = rand()<0.5 ? (0.05+rand()*0.23)*c.windMax : (0.55+rand()*0.45)*c.windMax; }
        ng.windCurrent=clamp(prev.windCurrent+(ng.windTarget-prev.windCurrent)*0.05+(rand()-0.5)*0.08*c.windMax*c.windGust,0,c.windMax);

        // clouds
        ng.cloudTimer-=0.1;
        if(ng.cloudTimer<=0){ ng.cloudTimer=3.5+rand()*6;
          ng.cloudTarget = rand()<c.cloudFreq ? (0.4+rand()*0.6)*c.cloudDark : 0; }
        ng.cloudCover=clamp(prev.cloudCover+(ng.cloudTarget-prev.cloudCover)*0.05,0,1);

        ng.hour=prev.hour+dt;

        // birds
        let strikeNow=0;
        if(c.birdFreq>0){
          if(prev.birdState==='none'){
            ng.birdSpawn=prev.birdSpawn-0.1;
            if(ng.birdSpawn<=0){ ng.birdState='incoming'; ng.birdTimer=0; ng.birdX=-12; ng.struck=false; }
          } else {
            ng.birdTimer=prev.birdTimer+0.1;
            if(prev.birdState==='incoming'){ ng.birdX=prev.birdX+1.3; if(ng.birdX>=58){ ng.birdState='danger'; ng.birdTimer=0; } }
            else if(prev.birdState==='danger'){ ng.birdX=prev.birdX+0.45;

                strikeNow = STRIKE_FINE*dt*1.6;
                if(!prev.struck){ ng.struck=true; ng.strikes=prev.strikes+1; }
              }
              if(ng.birdTimer>3.6){ ng.birdState='leaving'; } }
            else if(prev.birdState==='leaving'){ ng.birdX=prev.birdX+1.6;
              if(ng.birdX>112){ ng.birdState='none'; ng.birdSpawn=(16+rand()*20)/c.birdFreq; } }

        const solar=solarOut(ng.hour,1-ng.cloudCover*0.7,c.solarCap,c.sunrise,c.sunset);
        const wind=prev.turbines?ng.windCurrent:0;
        const gen=solar+wind;
        const demand=demandOut(ng.hour,c.demBase,c.demPeak,c.shape);

        const price=Math.max(6,priceAt(ng.hour,c.night,c.dip,c.eve)+ng.priceNoise);

        const deficit=Math.max(0,demand-gen);

        if(prev.batMode==='sell'){ const totalDis=Math.min(c.batRate,prev.soc/dt); exportDischargeKw=Math.max(0,totalDis-backupKw); }
        else if(prev.batMode==='charge'){ const surplusGen=Math.max(0,gen-demand); const head=(c.batCap-prev.soc)/0.9/dt; drawForCharge=Math.min(c.batRate,surplusGen,head); }
        const discharge=backupKw+exportDischargeKw;
        let soc=prev.soc - discharge*dt + drawForCharge*dt*0.9;
        ng.soc=clamp(soc,0,c.batCap);

        const supply=gen+discharge;
        const served=Math.min(supply,demand);
        const exportKw=Math.max(0,gen+discharge-demand-drawForCharge);
        const revRate=exportKw/1000*price;
        const degRate=exportDischargeKw/1000*DEG;  // wear only on battery energy you deliberately SELL, never on survival backup
        const net=(revRate-degRate)*dt - strikeNow;
        ng.money=prev.money+net;
        ng.degCost=prev.degCost+degRate*dt;
        ng.strikeCost=prev.strikeCost+strikeNow;
        ng.peakMoney=Math.max(prev.peakMoney,ng.money);

        // status / fail
        let status; if(supply>=demand*1.1)status='green'; else if(supply>=demand-0.01)status='yellow'; else status='red';
        const under=supply<demand-0.01;
        if(under){ ng.undersupplyTimer=prev.undersupplyTimer+0.1; if(!prev.wasUnder)ng.nearMisses=prev.nearMisses+1; ng.wasUnder=true; }
        else { ng.undersupplyTimer=0; ng.wasUnder=false; }
        ng.flicker=under;

        ng.solar=solar; ng.wind=wind; ng.gen=gen; ng.demand=demand; ng.price=price;
        ng.exportKw=exportKw; ng.toBat=drawForCharge; ng.fromBat=discharge; ng.toBldg=served;
        ng.status=status; ng.revRate=(revRate-degRate);

        // floaters
        fAcc.current+=net; fTick.current+=1;
        if(fTick.current>=10){ const amt=fAcc.current; fAcc.current=0; fTick.current=0;
          if(Math.abs(amt)>=1){ const myid=++fid.current;
            setFloaters(f=>[...f.slice(-6),{id:myid,amt,x:40+rand()*10,neg:amt<0}]);
            setTimeout(()=>setFloaters(f=>f.filter(x=>x.id!==myid)),1400);} }

        if(ng.undersupplyTimer>2.0 && ng.hour>0.8){ result.current={...ng,dead:true,city:c}; setTimeout(()=>setScreen('gameover'),0); }
        else if(ng.hour>=24){ ng.hour=24; result.current={...ng,dead:false,won:ng.money>=c.target,city:c}; setTimeout(()=>setScreen('results'),0); }
        return ng;
      });
    },100);
    return ()=>clearInterval(id);
  },[screen]);

  const city=CITIES[cityIdx];
  const setCtrl=(patch)=>setG(prev=>({...prev,...patch}));

  return (
    <div className="h-[100dvh] w-full flex flex-col items-center text-white overflow-hidden">
      <div className="w-full max-w-[1000px] h-full flex flex-col px-2 sm:px-3 pt-1 pb-2 overflow-hidden">
        <Header city={city} g={g} onHelp={()=>setHelp(true)}/>
        <div className="relative flex-1 min-h-0 my-1"><World g={g} city={city} floaters={floaters}/></div>
        <Hud g={g} city={city}/>
        <Controls g={g} city={city} setCtrl={setCtrl}/>
      </div>

      {screen==='lang' && <LangSelect onPick={(l)=>{ setLang(l); setScreen(saveRef.current.name?'welcome':'name'); }}/>}
      {screen==='name' && <NameEntry initial={saveRef.current.name} onDone={(nm)=>{ updateSave({name:nm}); setScreen('tutorial'); }}/>}
      {screen==='welcome' && <Welcome name={saveRef.current.name} onContinue={()=>setScreen('select')} onFresh={()=>{ updateSave({name:'',unlocked:1,badges:[],best:{}}); setUnlocked(1); setScreen('lang'); }}/>}
      {screen==='tutorial' && <Tutorial onStart={()=>setScreen('select')}/>}
      {screen==='select' && <CitySelect unlocked={unlocked} onPick={enterCity} setLang={setLang} save={save} onBoard={()=>setScreen('leaderboard')} onHelp={()=>setHelp(true)}/>}
      {screen==='leaderboard' && <Leaderboard save={save} onClose={()=>setScreen('select')}/>}
      {screen==='intro' && <CityIntro city={city} onGo={()=>setScreen('playing')} onBack={()=>setScreen('select')}/>}
      {screen==='results' && <Results r={result.current} save={save}
          onNext={()=>{ const ni=Math.min(cityIdx+1,CITIES.length-1); enterCity(ni); }}
          onRetry={()=>enterCity(cityIdx)} onMap={()=>setScreen('select')}
          hasNext={cityIdx<CITIES.length-1}/>}
      {screen==='gameover' && <GameOver r={result.current} onRetry={()=>enterCity(cityIdx)} onMap={()=>setScreen('select')}/>}
      {help && <Help onClose={()=>setHelp(false)}/>}
    </div>
  );
}

/* ================================ World ============================= */
function World({g,city,floaters}){
  const [top,bottom]=skyColors(g.hour);
  const day=g.hour>=city.sunrise && g.hour<=city.sunset;
  const tt=clamp((g.hour-city.sunrise)/(city.sunset-city.sunrise),0,1);
  const sunX=70+tt*620, sunY=330-Math.sin(Math.PI*tt)*270;
  const nightT=g.hour>city.sunset?(g.hour-city.sunset)/(24-city.sunset+city.sunrise):(g.hour+ (24-city.sunset))/(24-city.sunset+city.sunrise);
  const moonX=120+clamp(nightT,0,1)*620, moonY=300-Math.sin(Math.PI*clamp(nightT,0,1))*230;
  const solarMult=day?(1-g.cloudCover*0.7)*Math.max(0.05,Math.sin(Math.PI*tt)):0;
  const socFrac=clamp(g.soc/city.batCap,0,1);
  const powered=g.toBldg>=g.demand-0.01;
  const windNorm=clamp(g.windCurrent/city.windMax,0,1);
  const spinDur=(2.8-windNorm*2.45).toFixed(2);
  const starOp=clamp((g.hour<city.sunrise||g.hour>city.sunset+0.3)?0.85:0,0,1);
  const turbStopped=!g.turbines;
  const birdsVisible=g.birdState!=='none';
  const danger=g.birdState==='danger' && g.turbines;

  return (
    <div className="relative w-full h-full rounded-2xl overflow-hidden border-2 border-black/30 shadow-xl nodrag" style={{background:`linear-gradient(180deg,${top},${bottom})`}}>
      <svg viewBox="0 0 1000 560" preserveAspectRatio="xMidYMid meet" className="w-full h-full block">
        <defs>
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor={top}/><stop offset="1" stopColor={bottom}/></linearGradient>
          <radialGradient id="sunG"><stop offset="0" stopColor="#fff8c9"/><stop offset="0.5" stopColor="#ffd23f"/><stop offset="1" stopColor="#ff9d00"/></radialGradient>
          <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor={lerpColor(city.hue,'#ffffff',0.12)}/><stop offset="1" stopColor={lerpColor(city.hue,'#000000',0.25)}/></linearGradient>
          <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor={lerpColor(city.hue,'#ffffff',0.25)}/><stop offset="1" stopColor={city.hue}/></linearGradient>
          <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor={lerpColor(city.hue,'#ffffff',0.18)}/><stop offset="1" stopColor={lerpColor(city.hue,'#000000',0.35)}/></linearGradient>
          <linearGradient id="batG" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stopColor={socFrac<0.2?'#ff5d5d':'#34d96b'}/><stop offset="1" stopColor={socFrac<0.2?'#ff9d5d':'#a6ff5e'}/></linearGradient>
        </defs>

        <rect x="0" y="0" width="1000" height="560" fill="url(#sky)"/>
        {starOp>0.02 && [...Array(30)].map((_,i)=>(<circle key={i} cx={(i*149)%1000} cy={(i*61)%300} r={i%4===0?1.7:1} fill="#fff" opacity={starOp*(0.4+(i%5)/6)}/>))}

        {day ? (
          <g style={{animation:'sunGlow 4s ease-in-out infinite'}}><circle cx={sunX} cy={sunY} r="44" fill="url(#sunG)"/><circle cx={sunX} cy={sunY} r="60" fill="#ffe680" opacity="0.18"/></g>
        ) : (
          <g><circle cx={moonX} cy={moonY} r="30" fill="#eef1ff"/><circle cx={moonX+10} cy={moonY-6} r="26" fill={top} opacity="0.9"/></g>
        )}

        {/* clouds */}
        {[0,1,2,3,4,5].map(i=>{
          const op=clamp(g.cloudCover*1.4-i*0.11,0,0.96); if(op<=0.03)return null;
          const dur=(24+i*8)+'s'; const y=36+i*30; const sc=0.9+i*0.16;
          const dark=g.cloudCover>0.55?lerpColor('#ffffff','#7e879b',clamp((g.cloudCover-0.55)/0.45,0,1)):'#ffffff';
          return (<g key={i} style={{animation:`drift ${dur} linear infinite`,animationDelay:`${-i*5}s`}} opacity={op}>
            <g transform={`translate(0 ${y}) scale(${sc})`}>
              <ellipse cx="0" cy="0" rx="50" ry="26" fill={dark}/><ellipse cx="42" cy="7" rx="40" ry="24" fill={dark}/>
              <ellipse cx="-40" cy="9" rx="34" ry="22" fill={dark}/><ellipse cx="6" cy="-16" rx="32" ry="22" fill={dark}/></g></g>);
        })}

        {/* hills + ground */}
        <path d="M0,430 Q170,350 360,415 T720,405 T1000,420 L1000,560 L0,560 Z" fill="url(#hill1)"/>
        <path d="M0,470 Q230,405 480,460 T1000,455 L1000,560 L0,560 Z" fill="url(#hill2)"/>
        <rect x="0" y="505" width="1000" height="55" fill="url(#ground)"/>

        {/* CITY LANDMARK — sense of place */}
        <g transform="translate(500 412)"><Landmark city={city}/></g>

        {/* SOLAR PARK (left) — 3x4 array */}
        <g transform="translate(24 372)">
          <text x="120" y="-12" textAnchor="middle" className="font-black" fontSize="15" fill="#fff" opacity="0.88" stroke="#0008" strokeWidth="3" style={{paintOrder:'stroke'}}>☀ {t('wSolar')} · {Math.round(g.solar)} kW</text>
          {[0,1,2].map(row=>[0,1,2,3].map(col=>{
            const px=col*60, py=row*36; const cellCol=lerpColor('#16324f','#ffe14d',clamp(solarMult,0,1));
            return (<g key={row+'-'+col} transform={`translate(${px} ${py}) skewX(-14)`}>
              <rect x="0" y="0" width="52" height="28" rx="3" fill={cellCol} stroke="#0b1f33" strokeWidth="2"/>
              <line x1="17" y1="0" x2="17" y2="28" stroke="#0b1f33" strokeWidth="1.3" opacity="0.6"/>
              <line x1="35" y1="0" x2="35" y2="28" stroke="#0b1f33" strokeWidth="1.3" opacity="0.6"/>
              <line x1="0" y1="14" x2="52" y2="14" stroke="#0b1f33" strokeWidth="1.3" opacity="0.6"/>
              {solarMult>0.55 && <rect x="3" y="2" width="14" height="5" fill="#fff" opacity={(solarMult-0.55)*1.4}/>}</g>);
          }))}
        </g>

        {/* MINIGRID BUILDINGS (center) */}
        <g transform="translate(312 392)" className={g.flicker?'flick':''}>
          {[{x:0,w:62,h:118,rows:4,cols:2},{x:72,w:52,h:158,rows:5,cols:2},{x:134,w:70,h:100,rows:3,cols:3},
            {x:214,w:48,h:134,rows:4,cols:2},{x:272,w:64,h:112,rows:3,cols:3}].map((b,bi)=>{
            const col=lerpColor(city.accent,['#e85d75','#5d9ce8','#f2a93b','#7d6ef0','#46c79a'][bi],0.55);
            return (<g key={bi} transform={`translate(${b.x} ${164-b.h})`}>
              <rect x="0" y="0" width={b.w} height={b.h} rx="5" fill={col} stroke="#0008" strokeWidth="2"/>
              <rect x="0" y="0" width={b.w} height="9" rx="4" fill="#0003"/>
              {[...Array(b.rows)].map((_,r)=>[...Array(b.cols)].map((_,cc)=>{
                const ww=12,gap=(b.w-b.cols*ww)/(b.cols+1),wx=gap+cc*(ww+gap),wy=16+r*((b.h-24)/b.rows);
                return <rect key={r+'-'+cc} x={wx} y={wy} width={ww} height="11" rx="2" fill={powered?'#fff3a0':'#2a2f3a'} stroke="#0006" strokeWidth="1" style={powered?{filter:'drop-shadow(0 0 3px #ffe066)'}:{}}/>;
              }))}</g>);
          })}
          <text x="170" y="182" textAnchor="middle" className="font-black" fontSize="14" fill="#fff" opacity="0.85" stroke="#0008" strokeWidth="3" style={{paintOrder:'stroke'}}>🏙 {t('wMinigrid')} · {Math.round(g.demand)} kW</text>
        </g>

        {/* BATTERY PARK (center-right) */}
        <g transform="translate(648 360)">
          <text x="76" y="-14" textAnchor="middle" className="font-black" fontSize="14" fill="#fff" opacity="0.9" stroke="#0008" strokeWidth="3" style={{paintOrder:'stroke'}}>🔋 {Math.round(g.soc)} kWh</text>
          <rect x="0" y="0" width="152" height="96" rx="11" fill="#23303a" stroke="#0c151c" strokeWidth="3"/>
          <clipPath id="bclip"><rect x="9" y="9" width="134" height="78" rx="6"/></clipPath>
          <g clipPath="url(#bclip)"><rect x="9" y={9+78*(1-socFrac)} width="134" height={78*socFrac} fill="url(#batG)"/>
            {g.toBat>0.5 && <rect x="9" y="9" width="134" height="78" fill="#fff" opacity="0.12"/>}</g>
          {[1,2,3].map(s=>(<line key={s} x1="9" y1={9+19.5*s} x2="143" y2={9+19.5*s} stroke="#0c151c" strokeWidth="1.5" opacity="0.35"/>))}
          <text x="76" y="55" textAnchor="middle" className="font-black" fontSize="24" fill="#06231a" opacity="0.85">{Math.round(socFrac*100)}%</text>
          <rect x="48" y="-8" width="16" height="8" rx="2" fill="#23303a"/><rect x="88" y="-8" width="16" height="8" rx="2" fill="#23303a"/>
          {g.fromBat>0.5 && <text x="76" y="116" textAnchor="middle" fontSize="13" className="font-black" fill="#ffd84a">{t('wSelling',Math.round(g.fromBat))}</text>}
          {g.toBat>0.5 && <text x="76" y="116" textAnchor="middle" fontSize="13" className="font-black" fill="#9be6ff">{t('wCharging',Math.round(g.toBat))}</text>}
        </g>

        {/* WIND PARK (right) — 4 turbines */}
        <g transform="translate(812 232)">
          <text x="96" y="-8" textAnchor="middle" className="font-black" fontSize="14" fill="#fff" opacity="0.88" stroke="#0008" strokeWidth="3" style={{paintOrder:'stroke'}}>🌬 {t('wWind')} · {Math.round(g.wind)} kW</text>
          {[0,1,2,3].map(i=>{const tx=i*52,ty=i%2===1?16:0,h=i%2===1?150:124;
            return (<g key={i} transform={`translate(${tx} ${ty})`}>
              <rect x="-5" y="0" width="10" height={h} rx="4" fill="#e8eef2" stroke="#9fb0bb" strokeWidth="1.5"/>
              <g transform="translate(0 4)">
                <g className="blades" style={turbStopped?{}:{animation:`spin ${spinDur}s linear infinite`}}>
                  {[0,120,240].map(a=>(<g key={a} transform={`rotate(${a})`}>
                    <path d="M0,0 L7,-4 L3,-44 L-3,-44 L-7,-4 Z" fill={danger?'#ff8a8a':(turbStopped?'#cdd6dc':'#f2f7fa')} stroke="#b9c6cf" strokeWidth="1"/></g>))}
                </g>
                <circle cx="0" cy="0" r="6" fill="#cfd9df" stroke="#8fa0aa" strokeWidth="1.5"/></g></g>);
          })}

function Stat({label,value,sub,color}){
  return (<div className="bg-black/30 rounded-lg px-1.5 py-0.5 border border-white/10 text-center">

function Hud({g,city}){
  const sc=g.status==='green'?'#39d36b':g.status==='yellow'?'#f5b942':'#ff4d4d';
  const pvCut=g.cloudCover>0.08?` −${Math.round(g.cloudCover*70)}%`:'';
  return (
    <div className="shrink-0 mt-1 grid grid-cols-4 sm:grid-cols-7 gap-1">

      <Stat label={t('hSolar')} value={`${g.solar.toFixed(0)}`} sub={`kW${pvCut}`} color="#ffd23f"/>

            <div className="text-sm sm:text-base font-black">{t('turbines')}</div>
            <div className="text-[10px] font-bold" style={{color:g.turbines?'#8fd6ff':'#ffb499'}}>{g.turbines?t('tapStop'):t('stoppedBirds')}</div>

              <div className="text-sm sm:text-base font-black text-white">{st.ic} {t('hSolar')}</div>
              <div className="text-[10px] font-bold" style={{color:st.c}}>{st.s}</div>
            </div>
            <div className="text-right">

function BadgeRow({badges}){

    {CITIES.map(c=>{ const got=(badges||[]).includes(c.id);
      return (<div key={c.id} title={c.name} className="w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-black border-2"

function Leaderboard({save,onClose}){
  const [rows,setRows]=useState(undefined); // raw rows; undefined=loading; null=none/offline
  const [view,setView]=useState('overall'); // 'overall' | cityId
  useEffect(()=>{ let ok=true; (async()=>{ const data=await lbFetch(); if(ok) setRows(data||null); })(); return ()=>{ok=false;}; },[]);
  // build the ranked list for the chosen view
  let list=null;
  if(rows && rows.length){
    if(view==='overall'){
      list=lbAggregate(rows).map(p=>({name:p.name, score:p.total, sub:`${p.cities} ${t('lbCities')}`, boss:p.cities>=CITIES.length}));
    } else {
      const cid=Number(view), best={};
      rows.filter(r=>r.city===cid).forEach(r=>{ best[r.name]=Math.max(best[r.name]||0, r.score||0); });
      list=Object.entries(best).map(([name,score])=>({name,score})).sort((a,b)=>b.score-a.score).slice(0,20);
    }
  }
  const me=(save&&save.name)||'';
  const bestEntries=Object.entries(save.best||{}).map(([cid,sc])=>({city:Number(cid),score:sc})).sort((a,b)=>b.score-a.score);
  const total=bestEntries.reduce((a,b)=>a+b.score,0);
  return (<Modal accent="#ffd84a">
    <div className="flex items-center justify-between mb-2">
      <div className="text-xl font-black" style={{color:'#ffd84a'}}>{t('leaderboard')}</div>
      <button onClick={onClose} className="text-sm font-black text-white/70 border border-white/15 rounded-lg px-3 py-1">{t('close')}</button>
    </div>
    {SUPA_ON && (
      <select value={view} onChange={e=>setView(e.target.value)}
        className="w-full mb-2 px-3 py-2 rounded-lg bg-[#0e1422] border-2 border-white/15 text-white font-black text-sm outline-none">
        <option value="overall">{t('lbOverall')}</option>
        {CITIES.map(c=><option key={c.id} value={c.id}>{c.id}. {c.name}</option>)}
      </select>
    )}
    {!SUPA_ON ? (<div className="text-xs text-amber-300/90 font-semibold mb-2">{t('lbOffline')}</div>)
     : rows===undefined ? (<div className="text-sm text-white/60 font-semibold mb-2">{t('lbLoading')}</div>)
     : (!list||!list.length) ? (<div className="text-sm text-white/60 font-semibold mb-2">{t('lbEmpty')}</div>)
     : (<div className="space-y-1 mb-3">
        {list.map((p,i)=>{ const mine=p.name===me;
          return (<div key={i} className="flex items-center justify-between rounded-lg px-3 py-1.5 border"
            style={{background:mine?'rgba(255,216,74,.12)':'rgba(0,0,0,.3)', borderColor:mine?'#ffd84a':'rgba(255,255,255,.1)'}}>
            <div className="flex items-center gap-2 min-w-0">
              <span className="font-black w-5 text-center" style={{color:i===0?'#ffd84a':i<3?'#cfd6e0':'#7a8494'}}>{i+1}</span>
              <span className="font-black truncate" style={{color:mine?'#ffd84a':'#fff'}}>{p.name}</span>
              {p.boss && <span title="BESS BOSS">👑</span>}
            </div>
            <div className="text-right shrink-0"><span className="font-black" style={{color:'#b6ff7a'}}>€{fmt(p.score)}</span>{p.sub && <span className="text-[10px] text-white/45"> · {p.sub}</span>}</div>
          </div>); })}
      </div>)}
    <div className="text-[11px] uppercase tracking-wide text-white/45 font-black mb-1 mt-2">{t('yourBests')} — {me||'—'}</div>
    {bestEntries.length? (<div className="space-y-1">
      {bestEntries.map(e=>{ const c=CITIES.find(x=>x.id===e.city); return (<div key={e.city} className="flex items-center justify-between bg-black/20 rounded-lg px-3 py-1 border border-white/10">
        <span className="text-sm font-bold text-white/80">{c?c.name:('#'+e.city)}</span><span className="font-black" style={{color:'#b6ff7a'}}>€{fmt(e.score)}</span></div>); })}
      <div className="flex items-center justify-between px-3 py-1"><span className="text-sm font-black text-white/60">{t('totalScore')}</span><span className="font-black text-amber-300">€{fmt(total)}</span></div>
    </div>) : (<div className="text-sm text-white/50 font-semibold">{t('noBests')}</div>)}
  </Modal>);
}

      <div className="flex gap-1 shrink-0">
        <button onClick={onHelp} className="text-[11px] font-black px-2 py-1 rounded-md border" style={{borderColor:'#56e0ff',color:'#56e0ff'}}>{t('helpBtn')}</button>
        <button onClick={onBoard} className="text-[11px] font-black px-2 py-1 rounded-md border" style={{borderColor:'#ffd84a',color:'#ffd84a'}}>{t('leaderboard')}</button>
      </div>
    </div>
    <div className="text-xs text-white/60 mb-3 font-semibold">{t('pickGridSub')}</div>
    <div className="space-y-2">
      {CITIES.map((c,i)=>{const locked=i>=unlocked;
        return (<button key={c.id} disabled={locked} onClick={()=>onPick(i)}
          className="w-full text-left rounded-xl p-3 border-2 active:scale-[0.98] transition-transform disabled:opacity-40"
          style={{borderColor:locked?'#39414f':c.accent,background:'#0e1422'}}>
          <div className="flex items-center justify-between">
            <div className="font-black text-base" style={{color:locked?'#8a93a3':c.accent}}>{locked?'🔒 ':''}{c.id}. {c.name}</div>
            <div className="text-xs font-black text-white/80">🎯 €{fmt(c.target)}</div></div>
          <div className="text-[11px] text-white/60 font-semibold mt-0.5">{ct(c,'special')}</div></button>);
      })}
    </div>
  </Modal>);
}
function CityIntro({city,onGo,onBack}){
  return (<Modal accent={city.accent}>
    <div className="text-xs uppercase tracking-widest text-white/50 font-black">{t('cityWord')} {city.id} · {ct(city,'region')}</div>
    <div className="text-2xl font-black mb-1" style={{color:city.accent}}>{city.name}</div>
    <div className="text-sm text-white/85 mb-2 font-semibold">{ct(city,'lesson')}</div>
    <div className="rounded-xl p-3 mb-2 border border-white/10" style={{background:'#0e1422'}}>
      <div className="text-[11px] uppercase tracking-wide text-amber-300 font-black mb-1">{t('specialH')}</div>
      <div className="text-sm text-white/90 font-semibold">{ct(city,'special')}</div></div>
    <div className="grid grid-cols-2 gap-2 text-[12px] text-white/75 font-semibold mb-2">
      <div>{t('lblTarget')}: <b style={{color:city.accent}}>€{fmt(city.target)}</b></div>
      <div>{t('lblSolar')}: {city.solarCap} kW</div>
      <div>{t('lblWind')}: {city.windMax} kW</div>
      <div>{t('lblBattery')}: {city.batCap} kWh</div>
      <div>{t('lblPeakDem')}: {city.demPeak} kW</div>
      <div>{t('lblEvePrice')}: ~€{city.eve}</div>
    </div>
    <Btn onClick={onGo} color={city.accent}>{t('enterDay')}</Btn>
    <button onClick={onBack} className="w-full mt-2 py-2 rounded-xl font-bold text-sm text-white/70 border border-white/15">{t('backMap')}</button>
  </Modal>);
}
function Row({k,v,c}){
  return (<div className="flex items-center justify-between bg-black/30 rounded-lg px-3 py-2 border border-white/10">
    <span className="text-[13px] text-white/75 font-semibold">{k}</span><span className="font-black" style={{color:c||'#fff'}}>{v}</span></div>);
}
function Results({r,save,onNext,onRetry,onMap,hasNext}){
  const won=r.won, c=r.city;
  return (<Modal accent={won?'#7CFC9B':'#ff7a7a'}>
    {won && (<div className="rounded-xl p-3 mb-3 text-center border-2 popIn" style={{borderColor:'#ffd84a',background:'linear-gradient(135deg,#2a2150,#3a2a10)'}}>
      {BOSS_ART ? <img src={BOSS_ART} alt="BESS BOSS" className="max-h-24 mx-auto mb-1"/> : <div className="text-4xl mb-1 bob">⚡👑⚡</div>}
      <div className="text-lg font-black tracking-wide" style={{color:'#ffd84a'}}>{t('bossYou')}</div>
      <div className="text-xs text-white/70 font-bold mb-2">{t('bossCleared',c.name)}</div>
      <div className="flex justify-center"><BadgeRow badges={(save&&save.badges)||[]}/></div>
    </div>)}
    <div className="text-3xl font-black mb-1" style={{color:won?'#7CFC9B':'#ff7a7a'}}>{won?t('rCleared'):t('rMissed')}</div>
    <div className="text-sm text-white/70 mb-3 font-semibold">{won?t('rWonSub',c.name):t('rLostSub')}</div>
    <div className="space-y-2 mb-2">
      <Row k={t('rRev')} v={`€${fmt(r.money)}`} c={won?'#7CFC9B':'#fff'}/>
      <Row k={t('rTarget')} v={`€${fmt(c.target)}`}/>
      <Row k={t('rWear')} v={`−€${fmt(r.degCost)}`} c="#ff9d6b"/>
      {c.birdFreq>0 && <Row k={t('rFines')} v={`−€${fmt(r.strikeCost)} (${r.strikes})`} c={r.strikes>0?'#ff7a7a':'#7CFC9B'}/>}
      <Row k={t('rMisses')} v={`${r.nearMisses}`} c={r.nearMisses>0?'#f5b942':'#7CFC9B'}/>
    </div>
    {won && hasNext && <Btn onClick={onNext} color="#7CFC9B">{t('rNext')}</Btn>}
    {won && !hasNext && <Btn onClick={onMap} color="#7CFC9B">{t('rMastered')}</Btn>}
    {!won && <Btn onClick={onRetry} color="#ffd84a">{t('rRetry',c.name)}</Btn>}
    <button onClick={onMap} className="w-full mt-2 py-2 rounded-xl font-bold text-sm text-white/70 border border-white/15">{t('rMap')}</button>
  </Modal>);
}
function GameOver({r,onRetry,onMap}){
  const c=r.city;
  return (<Modal accent="#ff4d4d">
    <div className="text-3xl font-black mb-1" style={{color:'#ff4d4d'}}>{t('goTitle')}</div>
    {LANG==='es' ? (
    <div className="text-sm text-white/80 mb-3 font-semibold">{c.name} se quedó sin energía — la batería se vació por completo durante un déficit. Mantenla en <b style={{color:'#56e0ff'}}>CARGAR</b> en las horas baratas/soleadas y no abuses de <b style={{color:'#ffce3a'}}>VENDER</b>, para tener siempre reserva ante las calmas de viento, las nubes y las paradas por aves.</div>
    ) : (
    <div className="text-sm text-white/80 mb-3 font-semibold">{c.name} lost power — your battery ran completely empty during a shortfall. Keep it on <b style={{color:'#56e0ff'}}>CHARGE</b> through cheap/sunny hours and don't over-<b style={{color:'#ffce3a'}}>SELL</b>, so there's always reserve to cover wind lulls, clouds and bird-stops.</div>
    )}
    <div className="space-y-2 mb-3">
      <Row k={t('goReached')} v={clock(r.hour)}/>
      <Row k={t('goBanked')} v={`€${fmt(r.money)}`}/>
      <Row k={t('goMisses')} v={`${r.nearMisses}`} c="#f5b942"/>
    </div>
    <Btn onClick={onRetry} color="#ffd84a">{t('goRetry')}</Btn>
    <button onClick={onMap} className="w-full mt-2 py-2 rounded-xl font-bold text-sm text-white/70 border border-white/15">{t('rMap')}</button>
  </Modal>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
